<!DOCTYPE html>
<html>
<head>
    <title>Register — HR Enterprise</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
</head>
<body>

<div class="register-container">
    <h2>HR Enterprise</h2>
    <p>Create your company workspace</p>

    <input type="text"     id="companyName"  placeholder="Company Name">
    <input type="email"    id="companyEmail" placeholder="Company Email">
    <input type="text"     id="username"     placeholder="Admin Username">
    <input type="password" id="password"     placeholder="Password">

    <button onclick="register()">Create Workspace</button>

    <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<script src="app.js"></script>
<script src="cursor.js"></script>
</body>
</html>
